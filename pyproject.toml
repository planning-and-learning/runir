[build-system]
requires = [
    "scikit-build-core>=0.10",
    "pyyggdrasil==999.0.0",
    "pytyr==999.0.0",
]
build-backend = "pyrunir_build_backend"
backend-path = ["python"]

[project]
name = "pyrunir"
version = "999.0.0"
description = "Runir description logic feature library"
readme = "README.md"
requires-python = ">=3.9"
authors = [
    {name = "Dominik Drexler", email = "dominik.drexler@liu.se"},
]
dependencies = [
    "pyyggdrasil==999.0.0",
    "pytyr==999.0.0",
]

[project.optional-dependencies]
test = [
    "pytest",
]

[project.urls]
Homepage = "https://github.com/planning-and-learning/runir"

[tool.scikit-build]
build.targets = ["pyrunir_wheel"]
cmake.build-type = "Release"
install.components = ["pyrunir"]
wheel.packages = []

[tool.scikit-build.sdist]
include = [
    "CMakeLists.txt",
    "Config.cmake.in",
    "README.md",
    "pyproject.toml",
    "cmake/**",
    "include/**",
    "python/**",
    "src/**",
    "tests/**",
]
exclude = [
    "build*/**",
    "*.egg-info/**",
]

[tool.scikit-build.cmake.define]
RUNIR_BUILD_SHARED = "ON"
RUNIR_BUILD_PYRUNIR = "ON"
RUNIR_BUILD_TESTS = "OFF"
RUNIR_LINK_STATIC_DEPENDENCIES = "OFF"
CMAKE_INSTALL_LIBDIR = "lib"

[tool.cibuildwheel]
container-engine = "docker"
before-build = "python -m pip install --no-cache-dir 'pypddl==999.0.0' 'pyyggdrasil==999.0.0' 'pytyr==999.0.0'"

[tool.cibuildwheel.linux]
repair-wheel-command = "LD_LIBRARY_PATH=$(python -c 'import os, pypddl, pyyggdrasil, pytyr; prefixes = [pypddl.native_prefix(), pyyggdrasil.native_prefix(), pytyr.native_prefix()]; print(os.pathsep.join(str(path) for prefix in prefixes for path in sorted(prefix.glob(\"lib*\")) if path.is_dir()))') auditwheel repair -w {dest_dir} {wheel}"

[tool.cibuildwheel.macos]
repair-wheel-command = "delocate-wheel --ignore-missing-dependencies --no-sanitize-rpaths --require-archs {delocate_archs} -w {dest_dir} -v {wheel}"
