name: CI Pytest

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.13"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install CMake on Linux
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake

      - name: Install dependencies and requirements
        run: |
          python -m pip install --no-cache-dir --upgrade pip
          python -m pip install --no-cache-dir setuptools pytest 'pyyggdrasil>=0.0.8' 'pypddl>=1.0.4' 'pytyr>=0.0.14'
        env:
          PIP_NO_CACHE_DIR: 1
          PYYGGDRASIL_JOBS: 2
          PYPDDL_JOBS: 2
          TYR_JOBS: 2

      - name: Build and install
        run: python -m pip install --no-cache-dir --verbose .[test]
        env:
          PIP_NO_CACHE_DIR: 1
          RUNIR_JOBS: 2
          TYR_JOBS: 2
          PYYGGDRASIL_JOBS: 2
          PYPDDL_JOBS: 2

      - name: Test
        run: pytest python/tests
