name: CI Release

on:
  push:
    branches:
      - main
      - dev
  pull_request:
  workflow_dispatch:

jobs:
  build_sdist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build frontend
        run: |
          python -m pip install --no-cache-dir --upgrade pip
          python -m pip install --no-cache-dir build

      - name: Build source distribution
        run: python -m build --sdist

  build_wheels_linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        architecture: ["x86_64"]
        python-version: ["cp39", "cp310", "cp311", "cp312", "cp313"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install cibuildwheel
        run: |
          python -m pip install --no-cache-dir --upgrade pip
          python -m pip install --no-cache-dir cibuildwheel

      - name: Build Linux wheels
        run: cibuildwheel --output-dir wheelhouse
        env:
          CIBW_PLATFORM: linux
          CIBW_BUILD: "${{ matrix.python-version }}-*"
          CIBW_SKIP: "*-musllinux_*"
          CIBW_ARCHS: "${{ matrix.architecture }}"
          CIBW_BUILD_VERBOSITY: "1"
          CIBW_ENVIRONMENT: "RUNIR_JOBS=2 TYR_JOBS=2 PYPDDL_JOBS=2 PYYGGDRASIL_JOBS=2 PIP_NO_CACHE_DIR=1"

  build_wheels_macos:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["cp39", "cp310", "cp311", "cp312", "cp313"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install cibuildwheel
        run: |
          python -m pip install --no-cache-dir --upgrade pip
          python -m pip install --no-cache-dir cibuildwheel

      - name: Build macOS wheels
        run: cibuildwheel --output-dir wheelhouse
        env:
          CIBW_PLATFORM: macos
          CIBW_BUILD: "${{ matrix.python-version }}-*"
          CIBW_ARCHS: arm64
          CIBW_BUILD_VERBOSITY: "1"
          CIBW_ENVIRONMENT: "RUNIR_JOBS=2 TYR_JOBS=2 PYPDDL_JOBS=2 PYYGGDRASIL_JOBS=2 PIP_NO_CACHE_DIR=1"
